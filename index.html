<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>krogxone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --text: #0f0f0f;
      --muted: #888;
      --border: rgba(0,0,0,0.08);
      --hover-bg: #0f0f0f;
      --hover-text: #f7f5f2;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0;
      opacity: 0;
      transform: translateY(16px);
      animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      margin-bottom: 2.5rem;
    }

    .handle {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .dot {
      color: var(--muted);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      background: white;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
      opacity: 0;
      transform: translateY(10px);
    }

    .link:nth-child(1) { animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) 0.25s forwards; }
    .link:nth-child(2) { animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) 0.35s forwards; }
    .link:nth-child(3) { animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) 0.45s forwards; }

    .link:hover {
      background: var(--hover-bg);
      color: var(--hover-text);
      border-color: var(--hover-bg);
      transform: translateY(-2px);
    }

    .link:hover .link-icon svg path,
    .link:hover .link-icon svg rect,
    .link:hover .link-icon svg circle,
    .link:hover .link-icon svg polygon {
      fill: var(--hover-text);
    }

    .link:hover .arrow {
      color: var(--hover-text);
      opacity: 0.5;
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .link-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
    }

    .link-label {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
    }

    .arrow {
      font-size: 1rem;
      opacity: 0.3;
      transition: opacity 0.2s;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
  </style>
</head>
